<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Prices</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f9fbf9; margin: 0; padding: 0; }
        .header { background-color: #2e7d32; color: white; padding: 15px; display: flex; align-items: center; font-size: 18px; }
        .search-box { padding: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 25px; box-sizing: border-box; }
        .filters { display: flex; gap: 10px; padding: 0 15px; overflow-x: auto; margin-bottom: 20px; }
        .pill { padding: 8px 16px; background: #e0e0e0; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 14px; }
        .pill.active { background: #2e7d32; color: white; }
        .product-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: white; }
        .cart-section { padding: 20px; background: white; margin-top: 20px; border-top: 2px solid #2e7d32; }
        button.pay-btn { background: #2e7d32; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">← Compare Prices</div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Search items..." onkeyup="filterProducts()">
    </div>
    <div class="filters" id="filterBar">
        <div class="pill active" onclick="setFilter('All')">All</div>
        <div class="pill" onclick="setFilter('Grains')">Grains</div>
        <div class="pill" onclick="setFilter('Dal')">Dal</div>
        <div class="pill" onclick="setFilter('Dairy')">Dairy</div>
        <div class="pill" onclick="setFilter('Vegetables')">Vegetables</div>
        <div class="pill" onclick="setFilter('Fruits')">Fruits</div>
    </div>
    <div id="productList"></div>
    
    <div class="cart-section">
        <h3>Your Cart</h3>
        <div id="cartItems"></div>
        <button class="pay-btn" onclick="checkout()">Proceed to Pay (INR)</button>
    </div>

    <script>
        const products = [
            { name: "Atta", cat: "Grains", price: 245 },
            { name: "Rice", cat: "Grains", price: 499 },
            { name: "Toor Dal", cat: "Dal", price: 175 },
            { name: "Milk", cat: "Dairy", price: 56 },
            { name: "Onion", cat: "Vegetables", price: 35 },
            { name: "Apple", cat: "Fruits", price: 150 }
        ];
        let cart = [];
        function render(list) {
            const container = document.getElementById('productList');
            container.innerHTML = list.map(p => `
                <div class="product-item">
                    <span>${p.name} - ₹${p.price}</span>
                    <button onclick="addToCart('${p.name}', ${p.price})">Add</button>
                </div>
            `).join('');
        }
        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cartItems').innerHTML = cart.map(i => `<div>${i.name}: ₹${i.price}</div>`).join('');
        }
        function setFilter(cat) {
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            const filtered = cat === 'All' ? products : products.filter(p => p.cat === cat);
            render(filtered);
        }
        function checkout() {
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            var options = {
                "key": "rzp_test_mockkey12345",
                "amount": total * 100,
                "currency": "INR",
                "name": "Smart Grocery",
                "handler": function(res){ alert("Payment Success!"); }
            };
            new Razorpay(options).open();
        }
        render(products);
    </script>
</body>
</html>
