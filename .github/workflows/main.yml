name: Full-Stack Testing (App + Web)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # TEST 1: Web Application Tests
  web-tests:
    runs-on: ubuntu-latest
    name: Web App Tests
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install Web Dependencies
      run: |
        cd web
        npm install
      continue-on-error: true
    
    - name: Run Web Tests
      run: |
        cd web
        npm test -- --passWithNoTests
      continue-on-error: true
    
    - name: Build Web App
      run: |
        cd web
        npm run build
      continue-on-error: true

  # TEST 2: Mobile App Tests
  mobile-tests:
    runs-on: ubuntu-latest
    name: Mobile App Tests
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install Mobile Dependencies
      run: |
        cd mobile
        npm install
      continue-on-error: true
    
    - name: Run Mobile Tests
      run: |
        cd mobile
        npm test -- --passWithNoTests
      continue-on-error: true
    
    - name: Build Mobile App
      run: |
        cd mobile
        npm run build
      continue-on-error: true

  # TEST 3: Backend/API Tests (if you have)
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install
      continue-on-error: true
    
    - name: Run Backend Tests
      run: |
        cd backend
        npm test -- --passWithNoTests
      continue-on-error: true

  # SUMMARY: Show all results
  test-summary:
    runs-on: ubuntu-latest
    name: Test Summary
    needs: [web-tests, mobile-tests, backend-tests]
    if: always()
    
    steps:
    - name: All Tests Completed
      run: echo "✅ Testing completed for Web App, Mobile App, and Backend"
